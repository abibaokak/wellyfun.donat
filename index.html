<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WellyFun Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#11182a;
position:sticky;
top:0;
}

.logo{
color:orange;
font-weight:bold;
font-size:20px;
}

.menu button{
margin:5px;
padding:10px;
border:none;
border-radius:10px;
background:#1b2440;
color:white;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:orange;
transform:scale(1.05);
}

.page{display:none;padding:20px;animation:fade .5s ease;}
.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.glow{
font-size:42px;
background:linear-gradient(90deg,orange,red,purple,blue,green);
-webkit-background-clip:text;
color:transparent;
}

.card{
background:#141c33;
padding:15px;
border-radius:15px;
margin-top:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-top:15px;
}

.cats button{
border:2px solid orange;
background:transparent;
color:white;
padding:10px;
margin:5px;
border-radius:10px;
cursor:pointer;
}

.cats button:hover{
background:orange;
}

.profile{
display:flex;
gap:20px;
}

.sidebar{
width:220px;
background:#121a2f;
padding:15px;
border-radius:15px;
}

.skin{
width:60px;
height:60px;
border-radius:10px;
background:linear-gradient(45deg,orange,purple,blue,green,red);
animation:spin 6s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.main{
flex:1;
background:#121a2f;
padding:20px;
border-radius:15px;
}

.profile-card{
display:flex;
gap:20px;
align-items:center;
background:#1b2440;
padding:15px;
border-radius:15px;
}

.actions div{
margin-top:10px;
padding:10px;
background:#1b2440;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.actions div:hover{
background:orange;
transform:translateX(5px);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.box{
background:#141c33;
padding:20px;
border-radius:15px;
width:300px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">🔥 WellyFun</div>

<div class="menu">
<button onclick="tab('home')">Главная</button>
<button onclick="tab('shop')">Магазин</button>
<button onclick="tab('support')">Поддержка</button>
<button onclick="tab('info')">Инфо</button>
<button onclick="tab('profile')">Профиль</button>
<button onclick="tab('auth')">Вход</button>
</div>
</div>

<!-- HOME -->
<section id="home" class="page active">
<h1 class="glow">Добро пожаловать на WellyFun</h1>
<div class="card">
<p>Анархия SMP сервер</p>
<p>Орбитальные пушки</p>
</div>
</section>

<!-- SHOP -->
<section id="shop" class="page">

<div class="cats">
<button onclick="filter('all')">Все</button>
<button onclick="filter('vip')">Привилегии</button>
<button onclick="filter('res')">Ресурсы</button>
<button onclick="filter('other')">Разное</button>
</div>

<div id="items" class="grid"></div>

</section>

<!-- SUPPORT -->
<section id="support" class="page">
<h2>Поддержка</h2>
<div class="card" id="chat"></div>
<input id="msg" placeholder="Сообщение">
<button onclick="send()">Отправить</button>
</section>

<!-- INFO -->
<section id="info" class="page">
<div class="card">
<h2>Информация</h2>
<p>Версия 1.21.11</p>
</div>
</section>

<!-- PROFILE -->
<section id="profile" class="page">

<div class="profile">

<div class="sidebar">
<div class="skin"></div>
<h3 id="nick">Player</h3>
<button onclick="editNick()">Редактировать</button>
<button onclick="topUp()">Пополнить</button>
<button onclick="historyF()">История</button>
<button onclick="settings()">Настройки</button>
</div>

<div class="main">

<h2>Личный кабинет</h2>

<div class="profile-card">
<div class="skin"></div>
<div>
<h3 id="username">Player</h3>
<p>Профиль игрока</p>
</div>
</div>

</div>
</div>

</section>

<!-- AUTH -->
<section id="auth" class="page">
<h2>Вход</h2>

<input


"email" placeholder="Email">
<input id="pass" placeholder="Пароль">

<h3>Регистрация</h3>
<input id="regEmail" placeholder="Email">
<input id="regNick" placeholder="Minecraft ник">
<input id="regPass" placeholder="Пароль">

<button onclick="login()">Войти</button>
<button onclick="register()">Регистрация</button>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="box">
<h3 id="mname"></h3>
<p id="mdesc"></p>
<p id="mprice"></p>

<button onclick="buy()">Перейти к оплате</button>
<button onclick="closeModal()">Закрыть</button>
</div>
</div>

<script>
let user=null;
let current=null;

/* SHOP ITEMS */
let items=[
{name:"VIP",price:59,type:"vip",desc:"База"},
{name:"Winner",price:499,type:"vip",desc:"Флай"},
{name:"Король",price:899,type:"vip",desc:"Топ"},
{name:"Геплы",price:49,type:"res",desc:"Яблоки"},
{name:"Незерит",price:99,type:"res",desc:"Слитки"},
{name:"Разбан",price:199,type:"other",desc:"Снятие бана"}
];

function tab(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function render(type="all"){
let box=document.getElementById("items");
box.innerHTML="";

items.filter(i=>type=="all"||i.type==type)
.forEach(i=>{
box.innerHTML+=`
<div class="card">
<h3>${i.name}</h3>
<p>${i.price}₽</p>
<button onclick='openM("${i.name}",${i.price},"${i.desc}")'>Купить</button>
</div>`;
});
}
render();

function filter(t){render(t);}

/* MODAL */
function openM(name,price,desc){
current={name,price};
document.getElementById("mname").innerText=name;
document.getElementById("mprice").innerText=price+"₽";
document.getElementById("mdesc").innerText=desc;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function buy(){
alert("Переход к оплате");
}

/* CHAT */
function send(){
let msg=document.getElementById("msg").value;
document.getElementById("chat").innerHTML+="<div>Ты: "+msg+"</div>";
document.getElementById("msg").value="";
}

/* LOGIN */
function login(){
if(!document.getElementById("email").value || !document.getElementById("pass").value){
alert("Заполни поля");
return;
}
alert("Вход выполнен");
}

/* REGISTER */
function register(){
let e=document.getElementById("regEmail").value;
let n=document.getElementById("regNick").value;
let p=document.getElementById("regPass").value;

if(!e || !n || !p){
alert("Заполни все поля");
return;
}

user={email:e,nick:n};
document.getElementById("nick").innerText=n;
document.getElementById("username").innerText=n;

alert("Регистрация успешна");
}

/* PROFILE BUTTONS */
function editNick(){
let n=prompt("Новый ник:");
if(n){
document.getElementById("nick").innerText=n;
document.getElementById("username").innerText=n;
}
}

function topUp(){
alert("Пополнение пока не подключено");
}

function historyF(){
alert("История покупок (пока нет базы)");
}

function settings(){
alert("Настройки профиля (скоро)");
}
</script>

</body>
</html> id=
