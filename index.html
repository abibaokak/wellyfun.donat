<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Донат-магазин</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  padding: 30px;
  background: #1c1c1c;
}

h1 {
  color: gold;
}

.shop {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 220px;
}

.price {
  color: #00ff99;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 6px;
}

button:hover {
  background: orange;
}
</style>

</head>

<body>

<header>
  <h1>💎 Донат-магазин сервера</h1>
  <p>Покупай привилегии и предметы</p>
</header>

<div class="shop">

  <div class="card">
    <h2>VIP</h2>
    <p class="price">60 ₽</p>
    <p>Базовая привилегия</p>
    <button>Купить</button>
  </div>

  <div class="card">
    <h2>Premium</h2>
    <p class="price">99 ₽</p>
    <p>Расширенные возможности</p>
    <button>Купить</button>
  </div>

  <div class="card">
    <h2>Стак золотых яблок</h2>
    <p class="price">40 ₽</p>
    <p>64 золотых яблока</p>
    <button>Купить</button>
  </div>

  <div class="card">
    <h2>Титан</h2>
    <p class="price">159 ₽</p>
    <p>ТОП привилегия сервера</p>
    <button>Купить</button>
  </div>

</div>

</body>
</html>
