<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Shop</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f1a;
    color:white;
}

/* TOP BAR */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#151528;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo {
    font-size:20px;
    font-weight:bold;
    color:#7c5cff;
}

.nav button {
    background:none;
    border:none;
    color:white;
    margin:0 10px;
    cursor:pointer;
    font-size:14px;
    opacity:0.7;
}
.nav button:hover {opacity:1}

/* ACCOUNT */
.account {
    background:#1c1c33;
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
}

/* LAYOUT */
.container {
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    background:#141424;
    min-height:100vh;
    padding:15px;
}

.sidebar button {
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#222244;
    color:white;
}

.sidebar button:hover {
    background:#7c5cff;
}

/* PRODUCTS */
.main {
    flex:1;
    padding:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:15px;
}

.card {
    background:#1a1a2e;
    padding:15px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
}

.card:hover {
    transform:scale(1.05);
    background:#242444;
}

.price {
    color:#7c5cff;
    font-weight:bold;
    margin-top:10px;
}

.buy {
    margin-top:10px;
    padding:8px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#7c5cff;
    color:white;
    cursor:pointer;
}

/* POPUP */
.popup {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1b1b2f;
    padding:20px;
    border-radius:15px;
    display:none;
    z-index:2000;
}

.popup button {
    margin-top:10px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:10px;
    background:#7c5cff;
    color:white;
}

/* BACKDROP */
#backdrop {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0.6;
    display:none;
    z-index:1500;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">⚡ MINE SHOP</div>

    <div class="nav">
        <button onclick="setCat('priv')">Привилегии</button>
        <button onclick="setCat('res')">Ресурсы</button>
        <button onclick="setCat('uni')">Уникальные</button>
    </div>

    <div class="account">
        Ник: <span id="nick">Player</span> |
        Баланс: <span id="bal">0</span>₽
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <button onclick="addMoney(100)">+100₽ (тест)</button>
        <button onclick="addMoney(500)">+500₽ (тест)</button>
        <button onclick="reset()">Сброс</button>
    </div>

    <div class="main" id="shop"></div>
</div>

<div id="backdrop"></div>

<div class="popup" id="popup">
    <h3 id="pname"></h3>
    <p id="pprice"></p>
    <button onclick="confirmBuy()">Купить</button>
</div>

<script>
let balance = parseInt(localStorage.getItem("bal")) || 0;
let current = null;
let category = "priv";

const items = [
    {id:1,cat:"priv",name:"VIP",price:199},
    {id:2,cat:"priv",name:"Босс",price:199},
    {id:3,cat:"priv",name:"Монарх",price:299},
    {id:4,cat:"priv",name:"Король",price:599},

    {id:5,cat:"res",name:"Стак геплов",price:40},
    {id:6,cat:"res",name:"Стак алмазов",price:20},
    {id:7,cat:"res",name:"Чар геплы x16",price:59},

    {id:8,cat:"uni",name:"Nuke",price:99},
    {id:9,cat:"uni",name:"Трапка x10",price:79},
    {id:10,cat:"uni",name:"Пласт x10",price:69},
];

function render(){
    document.getElementById("bal").innerText = balance;

    let shop = document.getElementById("shop");
    shop.innerHTML = "";

    items.filter(i=>i.cat==category).forEach(i=>{
        shop.innerHTML += `
        <div class="card">


<h3>${i.name}</h3>
            <div class="price">${i.price}₽</div>
            <button class="buy" onclick="openBuy(${i.id})">Купить</button>
        </div>`;
    });
}

function setCat(c){
    category=c;
    render();
}

function openBuy(id){
    current = items.find(i=>i.id==id);
    document.getElementById("pname").innerText = current.name;
    document.getElementById("pprice").innerText = current.price + "₽";

    document.getElementById("popup").style.display="block";
    document.getElementById("backdrop").style.display="block";
}

function confirmBuy(){
    if(balance < current.price){
        alert("❌ Нет денег");
        return;
    }
    balance -= current.price;
    localStorage.setItem("bal",balance);

    alert("✅ Куплено: " + current.name);

    close();
    render();
}

function close(){
    document.getElementById("popup").style.display="none";
    document.getElementById("backdrop").style.display="none";
}

function addMoney(m){
    balance += m;
    localStorage.setItem("bal",balance);
    render();
}

function reset(){
    balance=0;
    localStorage.setItem("bal",0);
    render();
}

render();
</script>

</body>
</html>
