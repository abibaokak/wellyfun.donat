<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellyFun Premium</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b12;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#7b2ff7,#f9a825,#ff6a00);
padding:25px;
text-align:center;
font-size:34px;
font-weight:bold;
}

/* NAV */
.nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.nav button{
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
background:rgba(255,255,255,0.08);
color:white;
font-weight:bold;
transition:0.3s;
}

.nav button:hover{
background:#7b2ff7;
transform:scale(1.1);
}

/* PAGES */
.page{display:none;padding:25px;}
.page.active{display:block;}

/* COLORS */
.purple{color:#b388ff;}
.yellow{color:#ffd54f;}
.orange{color:#ff8a50;}

/* CARDS */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:16px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px rgba(123,47,247,0.4);
}

/* PROFILE */
.profileBox{
background:rgba(255,255,255,0.06);
border-radius:16px;
padding:20px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
background:#1c1c2e;
color:white;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.save{
background:#7b2ff7;
color:white;
width:100%;
margin-top:10px;
}

.danger{
background:#ff3d3d;
color:white;
width:100%;
margin-top:10px;
}

/* SHOP */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
}

.buy{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#7b2ff7,#ff6a00);
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>🔥 WELLYFUN PREMIUM PANEL</header>

<div class="nav">
<button onclick="openTab('home')">Главная</button>
<button onclick="openTab('shop')">Магазин</button>
<button onclick="openTab('profile')">Профиль</button>
<button onclick="openTab('settings')">Настройки</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h1 class="purple">Добро пожаловать 👋</h1>
<p class="yellow">WellyFun SMP-Анархия</p>
<p class="orange">PvP • Экономика • Гриф • Кастом предметы</p>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<h2 class="purple">🛒 Магазин</h2>

<div class="cards">

<div class="card">
<h3>VIP</h3>
<p class="yellow">199₽</p>
<button class="buy" onclick="buy('VIP',199)">Купить</button>
</div>

<div class="card">
<h3>Король</h3>
<p class="orange">599₽</p>
<button class="buy" onclick="buy('Король',599)">Купить</button>
</div>

<div class="card">
<h3>Трапка x10</h3>
<p class="purple">79₽</p>
<button class="buy" onclick="buy('Трапка',79)">Купить</button>
</div>

</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">

<h2 class="purple">👤 Профиль</h2>

<div class="profileBox">
<p><b>Ник:</b> <span id="pNick"></span></p>
<p><b>Email:</b> <span id="pEmail"></span></p>
<p><b>Покупки:</b></p>
<div id="purchases"></div>
</div>

</div>

<!-- SETTINGS -->
<div id="settings" class="page">

<h2 class="orange">⚙ Настройки аккаунта</h2>

<div class="profileBox">

<input id="nick" placeholder="Ник">
<input id="email" placeholder="Email">

<button class="save" onclick="save()">Сохранить</button>
<button class="danger" onclick="resetData()">Выйти / Сброс</button>

</div>
</div>

<script>

let user={
nick:"Игрок",
email:"не задано",
purchases:[]
};

function openTab(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
updateProfile();
}

function save(){
user.nick=document.getElementById("nick").value;
user.email=document.getElementById("email").value;
updateProfile();
alert("Сохранено");
}

function resetData(){
user={nick:"Игрок",email:"не задано",purchases:[]};
updateProfile()


}

function buy(name,price){
user.purchases.push(`${name} - ${price}₽`);
updateProfile();
alert("Куплено: "+name);
}

function updateProfile(){
document.getElementById("pNick").innerText=user.nick;
document.getElementById("pEmail").innerText=user.email;

document.getElementById("purchases").innerHTML=
user.purchases.map(p=>`<div>✔ ${p}</div>`).join("");
}

updateProfile();

</script>

</body>
</html>;
