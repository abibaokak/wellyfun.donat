<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellyFun Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#7b2ff7,#f9a825);
padding:22px;
text-align:center;
font-size:32px;
font-weight:bold;
}

/* TABS */
.tabs{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
}

.tab{
padding:12px 16px;
background:#1c1c2e;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:#f9a825;
color:black;
}

/* PAGE */
.page{display:none;padding:20px;}
.page.active{display:block;}

/* CARD */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.card{
background:#1a1a2d;
border-radius:14px;
padding:15px;
border:1px solid #333;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* IMAGE */
.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* COLORS */
.title-purple{color:#b388ff;}
.title-yellow{color:#ffd54f;}
.title-orange{color:#ff8a50;}

/* BUTTON */
.buy-btn{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd54f,#ff8a50);
font-weight:bold;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #444;
}
</style>
</head>

<body>

<header>🔥 WELLYFUN SHOP</header>

<div class="tabs">
<button class="tab active" onclick="openTab('shop',event)">Магазин</button>
<button class="tab" onclick="openTab('cart',event)">Корзина</button>
<button class="tab" onclick="openTab('support',event)">Поддержка</button>
<button class="tab" onclick="openTab('info',event)">Инфо</button>
<button class="tab" onclick="openTab('profile',event)">Профиль</button>
<button class="tab" onclick="openTab('admin',event)">Админ</button>
</div>

<!-- SHOP -->
<div id="shop" class="page active">

<div class="cards">

<div class="card">
<img src="https://images.minecraft.net/vip.jpg">
<h3 class="title-yellow">VIP</h3>
<p>Базовая привилегия</p>
<div class="title-orange">199₽</div>
<button class="buy-btn" onclick="buy('VIP','199₽')">Купить</button>
</div>

<div class="card">
<img src="https://images.minecraft.net/king.jpg">
<h3 class="title-purple">Король</h3>
<p>Топ привилегия</p>
<div class="title-orange">599₽</div>
<button class="buy-btn" onclick="buy('Король','599₽')">Купить</button>
</div>

<div class="card">
<img src="https://images.minecraft.net/trap.jpg">
<h3 class="title-yellow">Трапка x10</h3>
<p>PvP коробка</p>
<div class="title-orange">79₽</div>
<button class="buy-btn" onclick="buy('Трапка','79₽')">Купить</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>Корзина</h2>
<div id="cartItems"></div>

<h3>💳 Оплата</h3>
<button class="buy-btn" onclick="pay()">Оплатить картой (FreeKassa)</button>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
<h2>Поддержка</h2>
<p>Discord: YOUR LINK</p>
</div>

<!-- INFO -->
<div id="info" class="page">
<h2>Информация</h2>
<p>WellyFun SMP-Анархия</p>
<p>Версия 1.21.11</p>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2>Профиль</h2>
<p>Ник: Player</p>
<p>Покупки: 0</p>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="admin" id="adminPanel">

<h2>Админ панель</h2>

<p>Добавить товар:</p>
<input placeholder="Название">
<input placeholder="Цена">
<button class="buy-btn">Добавить</button>

</div>
</div>

<script>

let currentItem={};

function openTab(id,event){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
event.target.classList.add("active");
}

function buy(name,price){
currentItem={name,price};
alert("Добавлено: " + name);
}

function pay(){
alert("Подключение: FreeKassa / Lava / Enot (backend нужен)");
}
</script>

</body>
</html>
