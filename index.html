<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellyFun Ultra Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0d15;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#7b2ff7,#ffcc00,#ff6a00);
padding:30px;
text-align:center;
font-size:40px;
font-weight:bold;
letter-spacing:1px;
}

/* NAV */
.nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:12px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:10;
}

.nav button{
padding:12px 16px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.nav button:hover{
transform:scale(1.1);
background:#7b2ff7;
}

/* PAGES */
.page{display:none;padding:25px;}
.page.active{display:block;animation:fade .3s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* HERO */
.hero{
background:linear-gradient(135deg,#7b2ff7,#ff6a00);
padding:25px;
border-radius:16px;
font-size:18px;
line-height:1.6;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
margin-top:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:16px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(123,47,247,0.4);
}

.price{
color:#ffd54f;
font-weight:bold;
margin-top:6px;
}

/* BUTTON */
.btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7b2ff7,#ff6a00);
color:white;
font-weight:bold;
cursor:pointer;
}

/* POPUP */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
}

.popupBox{
background:#111;
width:420px;
margin:120px auto;
padding:20px;
border-radius:14px;
}

/* CHAT */
.chat{
height:300px;
overflow:auto;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
}

.msg{padding:8px;margin:6px;border-radius:10px;}
.user{background:#7b2ff7;text-align:right;}
.bot{background:#222;}

/* PROFILE */
.profile{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:14px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🔥 WELLYFUN ULTRA PRO</header>

<div class="nav">
<button onclick="openTab('home')">Главная</button>
<button onclick="openTab('shop')">Магазин</button>
<button onclick="openTab('cart')">Корзина</button>
<button onclick="openTab('support')">Поддержка</button>
<button onclick="openTab('profile')">Профиль</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
🔥 WellyFun — топ SMP / Anarchy сервер  
💰 экономика • PvP • гриф • аукцион  
⚡ кастом предметы и экономика  
🚀 версия 1.21.11
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<div class="grid">

<div class="card" onclick="openProduct('VIP','199₽','Базовая привилегия')">
VIP <div class="price">199₽</div>
</div>

<div class="card" onclick="openProduct('Монарх','299₽','Средняя привилегия')">
Монарх <div class="price">299₽</div>
</div>

<div class="card" onclick="openProduct('Король','599₽','Топ привилегия')">
Король <div class="price">599₽</div>
</div>

<div class="card" onclick="openProduct('Трапка x10','79₽','PvP ловушки')">
Трапка <div class="price">79₽</div>
</div>

</div>

</div>

<!-- SUPPORT -->
<div id="support" class="page">

<h2>🆘 Поддержка</h2>

<div class="chat" id="chat">
<div class="msg bot">Опишите проблему 👇</div>
</div>

<input id="msg" placeholder="Сообщение">
<button class="btn" onclick="send()">Отправить</button>

</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2>👤 Профиль</h2>
<div class="profile" id="profileBox"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox">
<h3 id="pname"></h3>
<p id="pdesc"></p>
<p id="pprice"></p>
<button class="btn">Купить</button>
</div>
</div>

<script>

let user=JSON.parse(localStorage.getItem("user")


ull;
let currentProduct=null;

function openTab(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
renderProfile();
}

function openProduct(name,price,desc){
currentProduct={name,price,desc};
document.getElementById("pname").innerText=name;
document.getElementById("pprice").innerText=price;
document.getElementById("pdesc").innerText=desc;
document.getElementById("popup").style.display="block";
}

function send(){
let m=document.getElementById("msg").value;
if(!m) return;

document.getElementById("chat").innerHTML+=
`<div class="msg user">${m}</div>
<div class="msg bot">Мы ответим скоро 👍</div>`;
}

function renderProfile(){
if(!user) return;
document.getElementById("profileBox").innerHTML=
`Ник: ${user.nick}
Emai
{user.email}`;
}

</script>

</body>
</html>)||n
